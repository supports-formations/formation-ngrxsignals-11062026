<main class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="mx-auto flex w-full max-w-5xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.18em] text-cyan-700">Sparks Logistics</p>
                <h1 class="text-2xl font-bold tracking-tight">Gestion de colis</h1>
            </div>

            <nav class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 p-1">
                <a class="app-nav-link" routerLink="/colis" routerLinkActive="app-nav-link-active" [routerLinkActiveOptions]="{ exact: true }">
                    Liste
                </a>
                <a class="app-nav-link" routerLink="/colis/add" routerLinkActive="app-nav-link-active">
                    Nouveau colis
                </a>
            </nav>
        </div>
    </header>

    <section class="mx-auto w-full max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="app-surface">
            <router-outlet></router-outlet>
        </div>
    </section>
</main>
