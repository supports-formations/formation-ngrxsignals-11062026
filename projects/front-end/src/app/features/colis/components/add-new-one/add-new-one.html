<section class="mx-auto max-w-xl">
	<header class="mb-6">
		<h2 class="text-xl font-bold text-slate-900">Nouveau colis</h2>
		<p class="text-sm text-slate-600">Crée rapidement un envoi de test dans le système.</p>
	</header>

	<div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
		<p class="text-sm text-slate-600">Action de démonstration: création d'un colis prérempli.</p>

		<button class="mt-5 inline-flex items-center justify-center rounded-lg bg-cyan-700 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-cyan-800 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-700" (click)="save()">
			Enregistrer le colis
		</button>
	</div>
</section>
