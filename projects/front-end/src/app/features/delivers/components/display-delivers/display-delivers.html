@let items = delivers();

@if(isLoading()) {
    <i>Loading ....</i>
}

@for (item of items; track item.id) {
    <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <h3 class="font-semibold text-slate-900">{{ item.date }}</h3>
                <p class="text-sm text-slate-500">ID #{{ item.id }}</p>
            </div>
            <div>
                <button (click)="editDeliver(item)" class="rounded-md bg-blue-600 px-3 py-1 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Edit one
                </button>
            </div>
        </div>
    </article>
}
@empty {
 <i>No data</i>   
}


@let itemToEdit = toEditDeliver();
@if(itemToEdit) {
    <app-edit-one-deliver [item]="itemToEdit"></app-edit-one-deliver>
}
